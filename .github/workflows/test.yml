name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::these files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: unit tests
        run: go test ./...
      - name: no-cgo static build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/satelle
      # Integration + browser e2e tests (tests/, -tags integration) run LOCALLY
      # via `make integration` — they need a real Chrome and exercise the running
      # binary, so they are not part of GitHub CI by design.
